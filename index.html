<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e6e6e6;
    --text-dim: #555;
    --text-spoken: #666;
    --highlight: #e94560;
    --highlight-glow: rgba(233, 69, 96, 0.3);
    --action-text: #a8b2d1;
    --cue-bg: #1c2a4a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  /* ── Landing screen ── */
  #landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 24px;
    padding: 32px;
  }

  #landing h1 {
    font-size: 2rem;
    font-weight: 600;
    color: var(--highlight);
  }

  #landing textarea {
    width: 100%;
    max-width: 700px;
    height: 300px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 14px;
    resize: vertical;
  }

  #landing textarea::placeholder { color: var(--text-dim); }

  #landing .actions {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary {
    background: var(--highlight);
    color: #fff;
  }

  .btn-primary:hover { background: #c73a52; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  label.btn-secondary {
    display: inline-block;
  }

  label.btn-secondary input[type="file"] { display: none; }

  .or-divider { color: var(--text-dim); font-size: 14px; }

  /* ── Prompter screen ── */
  #prompter {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }

  .top-bar .segment-title {
    font-size: 0.9rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .top-bar .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--action-text);
    flex-shrink: 0;
  }

  .mic-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.2s;
  }

  .mic-indicator.active {
    background: var(--highlight);
    box-shadow: 0 0 8px var(--highlight-glow);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Main content — stacked vertically for narrow strip layout */
  .main-content {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Dialogue pane */
  .dialogue-pane {
    flex: 1;
    padding: 24px 20px;
    overflow-y: auto;
    line-height: 1.8;
    font-size: 1.35rem;
    font-weight: 400;
  }

  .dialogue-pane .word {
    display: inline;
    transition: color 0.15s, background 0.15s;
  }

  .dialogue-pane .word.spoken {
    color: var(--text-spoken);
  }

  .dialogue-pane .word.current {
    color: #fff;
    background: var(--highlight);
    border-radius: 3px;
    padding: 0 4px;
    margin: 0 -4px;
    box-shadow: 0 0 12px var(--highlight-glow);
  }

  .dialogue-pane .word.upcoming {
    color: var(--text);
  }

  /* Actions pane */
  .actions-pane {
    flex-shrink: 0;
    padding: 12px 20px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    background: var(--cue-bg);
  }

  .actions-pane:empty, .actions-pane:has(ul:empty) {
    display: none;
  }

  .actions-pane h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .actions-pane ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .actions-pane li {
    font-size: 0.85rem;
    color: var(--action-text);
    padding-left: 16px;
    position: relative;
    line-height: 1.4;
  }

  .actions-pane li::before {
    content: "\2022";
    position: absolute;
    left: 0;
    top: 0;
    color: var(--highlight);
  }

  .actions-pane a {
    color: var(--highlight);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .actions-pane a:hover { opacity: 0.8; }

  .actions-pane strong { color: var(--text); font-weight: 600; }

  .actions-pane em { font-style: italic; }

  .actions-pane code {
    font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
    background: rgba(255, 255, 255, 0.08);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 0.9em;
  }

  .actions-pane pre {
    margin-top: 6px;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow-x: auto;
    font-size: 0.8rem;
    line-height: 1.5;
  }

  .actions-pane pre code {
    font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
    background: transparent;
    padding: 0;
    color: var(--text);
    white-space: pre;
  }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .bottom-bar span {
    max-width: 45%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bottom-bar .nav-hint {
    opacity: 0.6;
    margin: 0 4px;
  }

  /* Done screen */
  .done-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(26, 26, 46, 0.95);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }

  .done-overlay.visible {
    display: flex;
  }

  .done-overlay h2 {
    font-size: 2rem;
    color: var(--highlight);
  }

  .done-overlay p {
    font-size: 1.1rem;
    color: var(--action-text);
  }

  /* State badge */
  .state-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .state-badge.ready { background: var(--border); color: var(--text); }
  .state-badge.tracking { background: var(--highlight); color: #fff; }
  .state-badge.paused { background: #e9a645; color: #1a1a2e; }

  /* Inline segment divider in continuous flow */
  .segment-divider {
    display: block;
    margin: 20px 0 12px;
    padding: 4px 0;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--highlight);
    border-top: 1px solid var(--border);
    opacity: 0.7;
  }

  .segment-divider:first-child {
    margin-top: 0;
    border-top: none;
  }
</style>
</head>
<body>

<!-- Landing screen -->
<div id="landing">
  <h1>Teleprompter</h1>
  <textarea id="script-input" placeholder="Paste your markdown script here..."></textarea>
  <div class="actions">
    <button class="btn btn-primary" id="btn-load-paste">Load Script</button>
    <span class="or-divider">or</span>
    <label class="btn btn-secondary">
      Choose .md file
      <input type="file" id="file-input" accept=".md,.markdown,.txt">
    </label>
  </div>
</div>

<!-- Prompter screen -->
<div id="prompter">
  <div class="top-bar">
    <span class="segment-title" id="segment-title"></span>
    <div class="status">
      <span class="state-badge ready" id="state-badge">Ready</span>
      <span id="segment-progress"></span>
      <div class="mic-indicator" id="mic-indicator"></div>
    </div>
  </div>
  <div class="main-content">
    <div class="dialogue-pane" id="dialogue-pane"></div>
    <div class="actions-pane" id="actions-pane">
      <h3>Action Cues</h3>
      <ul id="actions-list"></ul>
    </div>
  </div>
  <div class="bottom-bar">
    <span id="prev-preview"></span>
    <span id="next-preview"></span>
  </div>
  <div class="done-overlay" id="done-overlay">
    <h2>Done</h2>
    <p>All segments complete.</p>
    <button class="btn btn-primary" id="btn-restart">Restart</button>
  </div>
</div>

<script>
// ── UTF-8 base64 decoding ──

function base64ToUtf8(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return new TextDecoder('utf-8').decode(bytes);
}

// ── Script Parsing ──

function parseScript(md) {
  const lines = md.split('\n');
  const segments = [];
  let current = null;
  // Track the most recent action so continuation content (fenced code
  // blocks indented under the bullet) can be attached to it
  let currentAction = null;
  // Fenced code block state
  let inCodeBlock = false;
  let codeBlockLang = '';
  let codeBlockIndent = 0;
  let codeBlockLines = [];

  function pushCurrent() {
    if (current) {
      current.dialogue = current.dialogue.trim();
      current.words = current.dialogue ? current.dialogue.split(/\s+/) : [];
      current.syllableCounts = current.words.map(countSyllables);
      current.cumulativeSyllables = [];
      let sum = 0;
      for (const c of current.syllableCounts) {
        sum += c;
        current.cumulativeSyllables.push(sum);
      }
      current.totalSyllables = sum;
      segments.push(current);
    }
  }

  for (const line of lines) {
    // While inside a fenced code block, capture lines verbatim (with base
    // indent stripped) until we see a closing fence
    if (inCodeBlock) {
      if (/^\s*```\s*$/.test(line)) {
        if (currentAction) {
          currentAction.codeBlocks.push({
            lang: codeBlockLang,
            code: codeBlockLines.join('\n')
          });
        }
        inCodeBlock = false;
        codeBlockLang = '';
        codeBlockLines = [];
        continue;
      }
      const stripIndent = new RegExp('^\\s{0,' + codeBlockIndent + '}');
      codeBlockLines.push(line.replace(stripIndent, ''));
      continue;
    }

    const trimmed = line.trim();

    // Skip H1 lines (# title) — not segment boundaries
    if (/^#\s+[^#]/.test(trimmed)) continue;

    // Segment boundary: ## heading
    if (/^##\s+/.test(trimmed)) {
      pushCurrent();
      current = {
        title: trimmed.replace(/^##\s+/, ''),
        dialogue: '',
        actions: [],
        words: [],
        syllableCounts: [],
        cumulativeSyllables: [],
        totalSyllables: 0
      };
      currentAction = null;
      continue;
    }

    if (!current) {
      // Content before any heading — create an implicit "Intro" segment
      if (trimmed && trimmed !== '---') {
        current = {
          title: 'Intro',
          dialogue: '',
          actions: [],
          words: [],
          syllableCounts: [],
          cumulativeSyllables: [],
          totalSyllables: 0
        };
        currentAction = null;
      } else {
        continue;
      }
    }

    // Separator — ignore
    if (/^---+$/.test(trimmed)) continue;

    // Opening fence — attach the following code block to the current action
    const fenceOpen = line.match(/^(\s*)```(\S*)/);
    if (fenceOpen) {
      inCodeBlock = true;
      codeBlockLang = fenceOpen[2] || '';
      codeBlockIndent = fenceOpen[1].length;
      codeBlockLines = [];
      continue;
    }

    // Blockquote dialogue
    if (/^>\s*/.test(trimmed)) {
      let text = trimmed.replace(/^>\s*/, '');
      // Strip surrounding quotes (ASCII + smart quotes)
      text = text.replace(/^["\u201C\u201D]/, '').replace(/["\u201C\u201D]$/, '');
      current.dialogue += ' ' + text;
      currentAction = null;
      continue;
    }

    // Bullet action
    if (/^[-*]\s+/.test(trimmed)) {
      const action = {
        text: trimmed.replace(/^[-*]\s+/, ''),
        codeBlocks: []
      };
      current.actions.push(action);
      currentAction = action;
      continue;
    }
  }

  pushCurrent();
  return segments;
}

function renderInlineMarkdown(text) {
  // Escape HTML first, then apply markdown patterns
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  // Inline code (must run before bold/italic to avoid conflicts with * inside backticks)
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Links: [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Bold: **text** or __text__
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // Italic: *text* or _text_
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/\b_([^_]+)_\b/g, '<em>$1</em>');
  return html;
}

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 1;
  if (word.length <= 2) return 1;
  word = word.replace(/e$/, '');
  const vowelGroups = word.match(/[aeiouy]+/g);
  return Math.max(1, vowelGroups ? vowelGroups.length : 1);
}

// ── State ──

let segments = [];
let currentSegmentIndex = 0;
let currentWordIndex = 0;
let state = 'READY'; // READY | TRACKING | PAUSED | DONE
let spokenSyllables = 0;
let syllableOffset = 0; // subtracted from raw recognition total on segment change
let recognition = null;

// ── DOM refs ──

const $landing = document.getElementById('landing');
const $prompter = document.getElementById('prompter');
const $segTitle = document.getElementById('segment-title');
const $segProgress = document.getElementById('segment-progress');
const $dialoguePane = document.getElementById('dialogue-pane');
const $actionsList = document.getElementById('actions-list');
const $prevPreview = document.getElementById('prev-preview');
const $nextPreview = document.getElementById('next-preview');
const $micIndicator = document.getElementById('mic-indicator');
const $stateBadge = document.getElementById('state-badge');
const $doneOverlay = document.getElementById('done-overlay');
const $scriptInput = document.getElementById('script-input');

// ── Load script ──

function loadScript(md) {
  segments = parseScript(md);
  if (segments.length === 0) return;
  currentSegmentIndex = 0;
  currentWordIndex = 0;
  spokenSyllables = 0;
  syllableOffset = 0;
  state = 'READY';
  $landing.style.display = 'none';
  $prompter.style.display = 'flex';
  $doneOverlay.classList.remove('visible');
  renderAll();
  updateStateBadge();
}

// Check hash on load
(function checkHash() {
  const hash = location.hash;
  if (hash.startsWith('#base64:')) {
    try {
      const encoded = hash.slice(8);
      const md = base64ToUtf8(encoded);
      loadScript(md);
    } catch (e) {
      console.error('Failed to decode base64 script:', e);
    }
  }
})();

// Paste button
document.getElementById('btn-load-paste').addEventListener('click', () => {
  const md = $scriptInput.value.trim();
  if (md) loadScript(md);
});

// File input
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => loadScript(reader.result);
  reader.readAsText(file);
});

// Restart
document.getElementById('btn-restart').addEventListener('click', () => {
  currentSegmentIndex = 0;
  currentWordIndex = 0;
  spokenSyllables = 0;
  syllableOffset = 0;
  state = 'READY';
  $doneOverlay.classList.remove('visible');
  updateWordHighlights();
  updateSegmentMeta();
  updateStateBadge();
});

// ── Rendering ──

// Render all segments as one continuous flow (called once on load)
function renderAll() {
  $dialoguePane.innerHTML = '';

  segments.forEach((seg, si) => {
    // Inline segment divider
    const divider = document.createElement('div');
    divider.className = 'segment-divider';
    divider.textContent = seg.title;
    $dialoguePane.appendChild(divider);

    // Words
    seg.words.forEach((word, wi) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = word;
      span.dataset.seg = si;
      span.dataset.word = wi;
      $dialoguePane.appendChild(span);
      if (wi < seg.words.length - 1) {
        $dialoguePane.appendChild(document.createTextNode(' '));
      }
    });

    if (seg.words.length === 0) {
      const note = document.createElement('span');
      note.style.cssText = 'color:var(--text-dim);font-style:italic;font-size:0.9rem';
      note.textContent = '(no dialogue)';
      $dialoguePane.appendChild(note);
    }
  });

  updateWordHighlights();
  updateSegmentMeta();
}

function updateWordHighlights() {
  const wordEls = $dialoguePane.querySelectorAll('.word');
  wordEls.forEach(el => {
    const si = parseInt(el.dataset.seg);
    const wi = parseInt(el.dataset.word);
    el.classList.remove('spoken', 'current', 'upcoming');

    if (si < currentSegmentIndex) {
      el.classList.add('spoken');
    } else if (si === currentSegmentIndex) {
      if (wi < currentWordIndex) el.classList.add('spoken');
      else if (wi === currentWordIndex) el.classList.add('current');
      else el.classList.add('upcoming');
    } else {
      el.classList.add('upcoming');
    }
  });
  scrollCurrentWordIntoView();
}

function scrollCurrentWordIntoView() {
  const currentEl = $dialoguePane.querySelector('.word.current');
  if (currentEl) {
    currentEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function updateSegmentMeta() {
  const seg = segments[currentSegmentIndex];
  if (!seg) return;

  $segTitle.textContent = seg.title;
  $segProgress.textContent = `${currentSegmentIndex + 1}/${segments.length}`;

  // Actions
  $actionsList.innerHTML = '';
  seg.actions.forEach(action => {
    const li = document.createElement('li');

    // Main text — render inline `backticks` as <code> chips
    const textSpan = document.createElement('span');
    textSpan.innerHTML = renderInlineMarkdown(action.text);
    li.appendChild(textSpan);

    // Attached fenced code blocks
    action.codeBlocks.forEach(block => {
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      if (block.lang) code.className = 'language-' + block.lang;
      code.textContent = block.code;
      pre.appendChild(code);
      li.appendChild(pre);
    });

    $actionsList.appendChild(li);
  });

  // Prev/next previews
  $prevPreview.innerHTML = currentSegmentIndex > 0
    ? '<span class="nav-hint">&uarr;</span> ' + segments[currentSegmentIndex - 1].title
    : '';
  $nextPreview.innerHTML = currentSegmentIndex < segments.length - 1
    ? '<span class="nav-hint">&darr;</span> ' + segments[currentSegmentIndex + 1].title
    : '';
}

function updateStateBadge() {
  $stateBadge.className = 'state-badge';
  switch (state) {
    case 'READY':
      $stateBadge.textContent = 'Ready';
      $stateBadge.classList.add('ready');
      $micIndicator.classList.remove('active');
      break;
    case 'TRACKING':
      $stateBadge.textContent = 'Tracking';
      $stateBadge.classList.add('tracking');
      $micIndicator.classList.add('active');
      break;
    case 'PAUSED':
      $stateBadge.textContent = 'Paused';
      $stateBadge.classList.add('paused');
      $micIndicator.classList.remove('active');
      break;
    case 'DONE':
      $stateBadge.textContent = 'Done';
      $stateBadge.classList.add('ready');
      $micIndicator.classList.remove('active');
      break;
  }
}

// ── Segment navigation ──

function goToSegment(index) {
  if (index < 0 || index >= segments.length) return;
  syllableOffset += spokenSyllables;
  currentSegmentIndex = index;
  currentWordIndex = 0;
  spokenSyllables = 0;
  if (state === 'DONE') {
    state = 'PAUSED';
    $doneOverlay.classList.remove('visible');
    updateStateBadge();
  }
  updateWordHighlights();
  updateSegmentMeta();
}

function advanceSegment() {
  if (currentSegmentIndex >= segments.length - 1) {
    state = 'DONE';
    stopRecognition();
    // Move cursor past the end so nothing is highlighted
    const seg = segments[currentSegmentIndex];
    currentWordIndex = seg ? seg.words.length : 0;
    updateWordHighlights();
    updateStateBadge();
    $doneOverlay.classList.add('visible');
    return;
  }
  goToSegment(currentSegmentIndex + 1);
}

// ── Voice tracking ──

function startRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn('Web Speech API not supported');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    if (state !== 'TRACKING') return;

    // Count syllables from all results in this recognition session
    let rawTotal = 0;
    for (let i = 0; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript.trim();
      const words = transcript.split(/\s+/).filter(w => w);
      for (const w of words) {
        rawTotal += countSyllables(w);
      }
    }

    // Subtract the offset so only syllables spoken after the last
    // segment change count toward the current segment
    const adjusted = rawTotal - syllableOffset;
    if (adjusted > spokenSyllables) {
      spokenSyllables = adjusted;
      updateCursorFromSyllables();
    }
  };

  recognition.onend = () => {
    // Auto-restart if we're still tracking
    if (state === 'TRACKING' && recognition) {
      recognition.start();
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech' || event.error === 'aborted') return;
    console.error('Speech recognition error:', event.error);
  };

  recognition.start();
}

function stopRecognition() {
  if (recognition) {
    const ref = recognition;
    recognition = null;
    try { ref.stop(); } catch (e) {}
  }
}

function updateCursorFromSyllables() {
  const seg = segments[currentSegmentIndex];
  if (!seg || seg.words.length === 0) return;

  // Find word index from cumulative syllables
  let wordIndex = 0;
  for (let i = 0; i < seg.cumulativeSyllables.length; i++) {
    if (spokenSyllables >= seg.cumulativeSyllables[i]) {
      wordIndex = i + 1;
    }
  }

  wordIndex = Math.min(wordIndex, seg.words.length - 1);

  if (wordIndex !== currentWordIndex) {
    currentWordIndex = wordIndex;
    updateWordHighlights();
  }

  // Auto-advance when syllables reach 100% of segment
  if (seg.totalSyllables > 0 && spokenSyllables >= seg.totalSyllables) {
    advanceSegment();
  }
}

// ── Keyboard controls ──

document.addEventListener('keydown', (e) => {
  // Don't capture keys when typing in textarea
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if ($prompter.style.display === 'none') return;

  const seg = segments[currentSegmentIndex];

  switch (e.code) {
    case 'Space':
      e.preventDefault();
      if (state === 'READY' || state === 'PAUSED') {
        state = 'TRACKING';
        startRecognition();
      } else if (state === 'TRACKING') {
        state = 'PAUSED';
        stopRecognition();
      }
      updateStateBadge();
      break;

    case 'ArrowRight':
      e.preventDefault();
      if (seg && currentWordIndex < seg.words.length - 1) {
        const oldSyl = spokenSyllables;
        currentWordIndex++;
        spokenSyllables = seg.cumulativeSyllables[currentWordIndex - 1] || 0;
        syllableOffset += oldSyl - spokenSyllables;
        updateWordHighlights();
      }
      break;

    case 'ArrowLeft':
      e.preventDefault();
      if (currentWordIndex > 0) {
        if (state === 'DONE') {
          state = 'PAUSED';
          $doneOverlay.classList.remove('visible');
          updateStateBadge();
        }
        const oldSyl = spokenSyllables;
        currentWordIndex--;
        spokenSyllables = currentWordIndex > 0 ? seg.cumulativeSyllables[currentWordIndex - 1] : 0;
        syllableOffset += oldSyl - spokenSyllables;
        updateWordHighlights();
      } else if (currentSegmentIndex > 0) {
        // Wrap to last word of previous segment
        goToSegment(currentSegmentIndex - 1);
        const prevSeg = segments[currentSegmentIndex];
        if (prevSeg.words.length > 0) {
          currentWordIndex = prevSeg.words.length - 1;
          spokenSyllables = prevSeg.cumulativeSyllables[currentWordIndex - 1] || 0;
          // goToSegment already rebased offset; now adjust for the word position
          syllableOffset -= spokenSyllables;
          updateWordHighlights();
        }
      }
      break;

    case 'ArrowDown':
      e.preventDefault();
      advanceSegment();
      break;

    case 'ArrowUp':
      e.preventDefault();
      if (state === 'DONE') {
        // From Done, go to last word of current (last) segment
        state = 'PAUSED';
        $doneOverlay.classList.remove('visible');
        currentWordIndex = seg.words.length - 1;
        spokenSyllables = currentWordIndex > 0 ? seg.cumulativeSyllables[currentWordIndex - 1] : 0;
        updateStateBadge();
        updateWordHighlights();
      } else if (currentSegmentIndex > 0) {
        goToSegment(currentSegmentIndex - 1);
        // Land on last word of previous segment
        const upSeg = segments[currentSegmentIndex];
        if (upSeg.words.length > 0) {
          currentWordIndex = upSeg.words.length - 1;
          spokenSyllables = upSeg.cumulativeSyllables[currentWordIndex - 1] || 0;
          syllableOffset -= spokenSyllables;
          updateWordHighlights();
        }
      } else if (currentWordIndex > 0) {
        // First segment, not at first word — jump to beginning
        const oldSyl = spokenSyllables;
        currentWordIndex = 0;
        spokenSyllables = 0;
        syllableOffset += oldSyl;
        updateWordHighlights();
      }
      break;
  }
});

// ── Debug / puppet interface ──

window.tp = {
  // Inspect state
  get state() { return state; },
  get segmentIndex() { return currentSegmentIndex; },
  get wordIndex() { return currentWordIndex; },
  get syllables() { return spokenSyllables; },
  get segmentCount() { return segments.length; },

  get segment() {
    const s = segments[currentSegmentIndex];
    if (!s) return null;
    return {
      title: s.title,
      wordCount: s.words.length,
      totalSyllables: s.totalSyllables,
      words: s.words,
      actions: s.actions
    };
  },

  get allSegments() {
    return segments.map((s, i) => ({
      index: i,
      title: s.title,
      wordCount: s.words.length,
      totalSyllables: s.totalSyllables,
      actionCount: s.actions.length
    }));
  },

  // Navigation
  nextWord() {
    const seg = segments[currentSegmentIndex];
    if (seg && currentWordIndex < seg.words.length - 1) {
      const oldSyl = spokenSyllables;
      currentWordIndex++;
      spokenSyllables = seg.cumulativeSyllables[currentWordIndex - 1] || 0;
      syllableOffset += oldSyl - spokenSyllables;
      updateWordHighlights();
    }
    return this.snapshot();
  },

  prevWord() {
    if (currentWordIndex > 0) {
      const seg = segments[currentSegmentIndex];
      const oldSyl = spokenSyllables;
      currentWordIndex--;
      spokenSyllables = currentWordIndex > 0 ? seg.cumulativeSyllables[currentWordIndex - 1] : 0;
      syllableOffset += oldSyl - spokenSyllables;
      updateWordHighlights();
    } else if (currentSegmentIndex > 0) {
      goToSegment(currentSegmentIndex - 1);
      const prevSeg = segments[currentSegmentIndex];
      if (prevSeg.words.length > 0) {
        currentWordIndex = prevSeg.words.length - 1;
        spokenSyllables = prevSeg.cumulativeSyllables[currentWordIndex - 1] || 0;
        syllableOffset -= spokenSyllables;
        updateWordHighlights();
      }
    }
    return this.snapshot();
  },

  nextSegment() {
    advanceSegment();
    return this.snapshot();
  },

  prevSegment() {
    if (currentSegmentIndex > 0) goToSegment(currentSegmentIndex - 1);
    return this.snapshot();
  },

  goTo(segIdx, wordIdx) {
    if (segIdx >= 0 && segIdx < segments.length) {
      goToSegment(segIdx);
      if (typeof wordIdx === 'number') {
        const seg = segments[currentSegmentIndex];
        currentWordIndex = Math.max(0, Math.min(wordIdx, seg.words.length - 1));
        spokenSyllables = currentWordIndex > 0 ? seg.cumulativeSyllables[currentWordIndex - 1] : 0;
        syllableOffset -= spokenSyllables;
        updateWordHighlights();
      }
    }
    return this.snapshot();
  },

  // State transitions
  play() {
    if (state === 'READY' || state === 'PAUSED') {
      state = 'TRACKING';
      updateStateBadge();
    }
    return this.snapshot();
  },

  pause() {
    if (state === 'TRACKING') {
      state = 'PAUSED';
      stopRecognition();
      updateStateBadge();
    }
    return this.snapshot();
  },

  reset() {
    stopRecognition();
    currentSegmentIndex = 0;
    currentWordIndex = 0;
    spokenSyllables = 0;
    syllableOffset = 0;
    state = 'READY';
    $doneOverlay.classList.remove('visible');
    updateWordHighlights();
    updateSegmentMeta();
    updateStateBadge();
    return this.snapshot();
  },

  // Simulate voice input — feed spoken text as if from Web Speech API
  speak(text) {
    const words = text.trim().split(/\s+/).filter(w => w);
    let addedSyllables = 0;
    for (const w of words) addedSyllables += countSyllables(w);
    spokenSyllables += addedSyllables;

    // Auto-set state to tracking if in ready
    if (state === 'READY') {
      state = 'TRACKING';
      updateStateBadge();
    }

    updateCursorFromSyllables();
    return {
      fed: text,
      addedSyllables,
      ...this.snapshot()
    };
  },

  // Simulate speaking N syllables directly
  addSyllables(n) {
    spokenSyllables += n;
    if (state === 'READY') {
      state = 'TRACKING';
      updateStateBadge();
    }
    updateCursorFromSyllables();
    return this.snapshot();
  },

  // Load a script programmatically
  load(md) {
    loadScript(md);
    return this.snapshot();
  },

  // Current state snapshot
  snapshot() {
    const seg = segments[currentSegmentIndex];
    return {
      state,
      segmentIndex: currentSegmentIndex,
      segmentTitle: seg?.title,
      segmentCount: segments.length,
      wordIndex: currentWordIndex,
      wordCount: seg?.words?.length || 0,
      currentWord: seg?.words?.[currentWordIndex] || null,
      spokenSyllables,
      totalSyllables: seg?.totalSyllables || 0,
      pctComplete: seg?.totalSyllables ? Math.round(spokenSyllables / seg.totalSyllables * 100) : 0
    };
  }
};
</script>
